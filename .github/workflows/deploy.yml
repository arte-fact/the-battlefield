name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Build wgpu web
        run: bash build-wgpu-web.sh

      - name: Prepare deployment
        run: |
          mkdir -p _site
          cp web-wgpu/index.html _site/
          cp web-wgpu/battlefield_wgpu_native.js _site/
          cp web-wgpu/battlefield_wgpu_native_bg.wasm _site/
          cp web-wgpu/manifest.json _site/
          cp web-wgpu/sw.js _site/
          cp -r web-wgpu/icons _site/icons 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
