name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2

      - name: Install Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build SDL Emscripten
        run: bash build-sdl-web.sh

      - name: Prepare deployment
        run: |
          mkdir -p _site
          cp web-sdl/dist/index.html _site/
          cp web-sdl/dist/battlefield.js _site/
          cp web-sdl/dist/battlefield.wasm _site/
          cp web-sdl/dist/manifest.json _site/
          cp web-sdl/dist/sw.js _site/
          cp -r web-sdl/dist/icons _site/icons 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
