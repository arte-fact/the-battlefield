<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Real-time tactical battlefield game — command warriors, archers, lancers and monks in strategic combat.">
    <title>The Battlefield</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Battlefield">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #1a1a2e;
            overflow: hidden;
            width: 100%;
            height: 100%;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            touch-action: none;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            z-index: 20;
        }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="loading">Loading...</div>
    <script>
        function resizeCanvas() {
            var c = document.getElementById('canvas');
            var w = window.innerWidth;
            var h = window.innerHeight;
            // SDL2 manages the canvas pixel dimensions; CSS just fills the viewport
            c.style.width = w + 'px';
            c.style.height = h + 'px';
        }

        var Module = {
            canvas: document.getElementById('canvas'),
            onRuntimeInitialized: function() {
                document.getElementById('loading').style.display = 'none';
            },
            setStatus: function(text) {
                var el = document.getElementById('loading');
                if (el && text) el.textContent = text;
            }
        };

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(function() {});
        }

        // Fullscreen + wake lock
        window.__requestFullscreen = function() {
            var el = document.documentElement;
            var rfs = el.requestFullscreen
                || el.webkitRequestFullscreen
                || el.mozRequestFullScreen
                || el.msRequestFullscreen;
            if (rfs) {
                rfs.call(el).catch(function() {});
            }
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(function() {});
            }
        };

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
    </script>
    <script src="battlefield.js"></script>
</body>
</html>
