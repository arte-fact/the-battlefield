<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Real-time tactical battlefield game — command warriors, archers, lancers and monks in strategic combat.">
    <title>The Battlefield</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Battlefield">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        html, body {
            background: #1a1a2e;
            overflow: hidden;
            width: 100%;
            height: 100dvh;
            height: 100%;
            position: fixed;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            touch-action: none;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            z-index: 20;
        }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="loading">Loading...</div>
    <script>
        function viewportW() {
            return (window.visualViewport ? window.visualViewport.width : window.innerWidth);
        }
        function viewportH() {
            return (window.visualViewport ? window.visualViewport.height : window.innerHeight);
        }

        function resizeCanvas() {
            var c = document.getElementById('canvas');
            var w = viewportW();
            var h = viewportH();
            // SDL2 manages the canvas pixel dimensions; CSS just fills the viewport
            c.style.width = w + 'px';
            c.style.height = h + 'px';
        }

        var Module = {
            canvas: document.getElementById('canvas'),
            onRuntimeInitialized: function() {
                document.getElementById('loading').style.display = 'none';
            },
            setStatus: function(text) {
                var el = document.getElementById('loading');
                if (el && text) el.textContent = text;
            }
        };

        // ── Platform detection ──────────────────────────────────────
        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
            || ('ontouchstart' in window && navigator.maxTouchPoints > 1);
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches
            || window.matchMedia('(display-mode: fullscreen)').matches
            || window.navigator.standalone === true;
        var isFullscreen = false;

        // ── Service Worker + update notification ────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(function(reg) {
                    reg.addEventListener('updatefound', function() {
                        var newSW = reg.installing;
                        if (newSW) {
                            newSW.addEventListener('statechange', function() {
                                if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
                                    window.__swUpdateReady = true;
                                }
                            });
                        }
                    });
                }).catch(function() {});
        }

        // ── Fullscreen + wake lock ──────────────────────────────────
        function requestWakeLock() {
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(function() {});
            }
        }

        window.__requestFullscreen = function() {
            var el = document.documentElement;
            var rfs = el.requestFullscreen
                || el.webkitRequestFullscreen
                || el.mozRequestFullScreen
                || el.msRequestFullscreen;
            if (rfs) {
                rfs.call(el).then(function() {
                    isFullscreen = true;
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('any').catch(function() {});
                    }
                }).catch(function() {});
            }
            requestWakeLock();
        };

        // Re-enter fullscreen on every touch (mobile only).
        // Mobile browsers can exit fullscreen via swipe or system gesture.
        function onInteraction() {
            if (!isMobile && !isStandalone) return;
            if (!isFullscreen) {
                window.__requestFullscreen();
            }
        }
        document.addEventListener('touchstart', onInteraction, { passive: true });
        document.addEventListener('click', onInteraction);

        function onFullscreenChange() {
            isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
            resizeCanvas();
            setTimeout(resizeCanvas, 100);
        }
        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);

        // Re-acquire wake lock + apply SW update on visibility change
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                requestWakeLock();
                if (window.__swUpdateReady) {
                    window.__swUpdateReady = false;
                    location.reload();
                }
            }
        });

        // Orientation change backup
        if (screen.orientation) {
            screen.orientation.addEventListener('change', function() {
                setTimeout(resizeCanvas, 50);
                setTimeout(resizeCanvas, 200);
            });
        }

        // ── PWA install prompt ──────────────────────────────────────
        var deferredInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredInstallPrompt = e;
        });
        window.__installPWA = function() {
            if (deferredInstallPrompt) {
                deferredInstallPrompt.prompt();
                deferredInstallPrompt.userChoice.then(function() {
                    deferredInstallPrompt = null;
                });
            }
        };
        window.__canInstallPWA = function() { return !!deferredInstallPrompt; };

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', resizeCanvas);
        }
    </script>
    <script src="battlefield.js"></script>
</body>
</html>
