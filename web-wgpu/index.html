<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Real-time tactical battlefield game — command warriors, archers, lancers and monks in strategic combat.">
    <title>The Battlefield</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Battlefield">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #1a1a2e;
            overflow: hidden;
            width: 100%;
            height: 100%;
            overscroll-behavior: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: right 0.25s ease;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            touch-action: none;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
            z-index: 20;
        }

        /* Gear toggle button */
        #ai-config-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: rgba(26, 26, 46, 0.85);
            color: #ccc;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: background 0.15s, color 0.15s;
        }
        #ai-config-toggle:hover {
            background: rgba(40, 40, 70, 0.95);
            color: #fff;
        }
        #ai-config-toggle.active {
            background: #16213e;
            color: #4fc3f7;
        }

        /* Side panel */
        #ai-config-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 340px;
            height: 100%;
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            font-size: 12px;
            z-index: 999;
            overflow-y: auto;
            overflow-x: hidden;
            transform: translateX(100%);
            transition: transform 0.25s ease;
            border-left: 1px solid #2a2a4a;
            scrollbar-width: thin;
            scrollbar-color: #3a3a5a #1a1a2e;
        }
        #ai-config-panel.open {
            transform: translateX(0);
        }
        #ai-config-panel::-webkit-scrollbar { width: 6px; }
        #ai-config-panel::-webkit-scrollbar-track { background: #1a1a2e; }
        #ai-config-panel::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }

        #ai-config-panel .panel-header {
            position: sticky;
            top: 0;
            background: #16213e;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a4a;
            z-index: 1;
        }
        #ai-config-panel .panel-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin: 0;
        }
        #ai-config-panel .panel-header button {
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
        }
        #ai-config-panel .panel-header button:hover {
            background: #c0392b;
        }

        #ai-config-panel details {
            border-bottom: 1px solid #2a2a4a;
        }
        #ai-config-panel summary {
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            color: #4fc3f7;
            background: #16213e;
            user-select: none;
            list-style: none;
        }
        #ai-config-panel summary::-webkit-details-marker { display: none; }
        #ai-config-panel summary::before {
            content: '\25B6';
            display: inline-block;
            margin-right: 8px;
            font-size: 9px;
            transition: transform 0.15s;
        }
        #ai-config-panel details[open] > summary::before {
            transform: rotate(90deg);
        }

        #ai-config-panel .field {
            padding: 6px 14px 8px;
        }
        #ai-config-panel .field-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }
        #ai-config-panel .field-label span:first-child {
            color: #aaa;
            font-size: 11px;
        }
        #ai-config-panel .field-label .field-value {
            color: #fff;
            font-weight: 600;
            font-size: 11px;
            min-width: 45px;
            text-align: right;
        }
        #ai-config-panel .field-desc {
            color: #777;
            font-size: 9px;
            margin-bottom: 2px;
            line-height: 1.2;
        }
        #ai-config-panel input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #2a2a4a;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        #ai-config-panel input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4fc3f7;
            border: 2px solid #1a1a2e;
            cursor: pointer;
        }
        #ai-config-panel input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4fc3f7;
            border: 2px solid #1a1a2e;
            cursor: pointer;
        }
    </style>
</head>

        function buildPanel() {
            var container = document.getElementById('ai-config-sections');
            var html = '';
            for (var s = 0; s < AI_CONFIG_SCHEMA.length; s++) {
                var sec = AI_CONFIG_SCHEMA[s];
                html += '<details><summary>' + sec.section + '</summary>';
                for (var f = 0; f < sec.fields.length; f++) {
                    var fd = sec.fields[f];
                    var val = aiConfigCache[fd.key] !== undefined ? aiConfigCache[fd.key] : fd.def;
                    html += '<div class="field">';
                    html += '<div class="field-label"><span>' + fd.label + '</span>';
                    html += '<span class="field-value" id="val-' + fd.key + '">' + formatVal(val, fd.step) + '</span></div>';
                    if (fd.desc) html += '<div class="field-desc">' + fd.desc + '</div>';
                    html += '<input type="range" id="slider-' + fd.key + '" ';
                    html += 'min="' + fd.min + '" max="' + fd.max + '" step="' + fd.step + '" ';
                    html += 'value="' + val + '" ';
                    html += 'data-key="' + fd.key + '">';
                    html += '</div>';
                }
                html += '</details>';
            }
            container.innerHTML = html;

            var sliders = container.querySelectorAll('input[type="range"]');
            for (var i = 0; i < sliders.length; i++) {
                sliders[i].addEventListener('input', onSliderChange);
            }
        }

        function formatVal(v, step) {
            if (step >= 1) return String(Math.round(v));
            var decimals = String(step).split('.')[1];
            var places = decimals ? decimals.length : 1;
            return Number(v).toFixed(places);
        }

        function onSliderChange(e) {
            var key = e.target.getAttribute('data-key');
            var val = parseFloat(e.target.value);
            aiConfigCache[key] = val;

            var field = findField(key);
            var valEl = document.getElementById('val-' + key);
            if (valEl && field) {
                valEl.textContent = formatVal(val, field.step);
            }

            if (wasmModule && wasmModule.set_ai_config) {
                try {
                    wasmModule.set_ai_config(JSON.stringify(aiConfigCache));
                } catch (err) {
                    console.warn('set_ai_config failed:', err);
                }
            }
        }

        function findField(key) {
            for (var s = 0; s < AI_CONFIG_SCHEMA.length; s++) {
                for (var f = 0; f < AI_CONFIG_SCHEMA[s].fields.length; f++) {
                    if (AI_CONFIG_SCHEMA[s].fields[f].key === key) return AI_CONFIG_SCHEMA[s].fields[f];
                }
            }
            return null;
        }

        function populateFromWasm() {
            if (!wasmModule || !wasmModule.get_ai_config) return;
            try {
                var json = wasmModule.get_ai_config();
                var cfg = JSON.parse(json);
                for (var k in cfg) {
                    aiConfigCache[k] = cfg[k];
                }
            } catch (err) {
                console.warn('get_ai_config failed:', err);
            }
            refreshSliders();
        }

        function refreshSliders() {
            for (var s = 0; s < AI_CONFIG_SCHEMA.length; s++) {
                for (var f = 0; f < AI_CONFIG_SCHEMA[s].fields.length; f++) {
                    var fd = AI_CONFIG_SCHEMA[s].fields[f];
                    var val = aiConfigCache[fd.key] !== undefined ? aiConfigCache[fd.key] : fd.def;
                    var slider = document.getElementById('slider-' + fd.key);
                    var valEl = document.getElementById('val-' + fd.key);
                    if (slider) slider.value = val;
                    if (valEl) valEl.textContent = formatVal(val, fd.step);
                }
            }
        }

        function resetAll() {
            for (var k in aiConfigDefaults) {
                aiConfigCache[k] = aiConfigDefaults[k];
            }
            refreshSliders();
            if (wasmModule && wasmModule.set_ai_config) {
                try {
                    wasmModule.set_ai_config(JSON.stringify(aiConfigCache));
                } catch (err) {
                    console.warn('set_ai_config reset failed:', err);
                }
            }
        }

        function togglePanel() {
            aiPanelOpen = !aiPanelOpen;
            var panel = document.getElementById('ai-config-panel');
            var btn = document.getElementById('ai-config-toggle');
            var container = document.getElementById('canvas-container');

            if (aiPanelOpen) {
                populateFromWasm();
                panel.classList.add('open');
                btn.classList.add('active');
                container.style.right = '340px';
                btn.style.right = '350px';
            } else {
                panel.classList.remove('open');
                btn.classList.remove('active');
                container.style.right = '0';
                btn.style.right = '10px';
            }
            resizeCanvas();
            // Re-resize after CSS transition completes
            setTimeout(resizeCanvas, 300);
        }

        // Initialize defaults from schema
        for (var s = 0; s < AI_CONFIG_SCHEMA.length; s++) {
            for (var f = 0; f < AI_CONFIG_SCHEMA[s].fields.length; f++) {
                var fd = AI_CONFIG_SCHEMA[s].fields[f];
                aiConfigDefaults[fd.key] = fd.def;
                aiConfigCache[fd.key] = fd.def;
            }
        }

        buildPanel();

        document.getElementById('ai-config-toggle').addEventListener('click', togglePanel);
        document.getElementById('ai-config-reset').addEventListener('click', resetAll);

        function resizeCanvas() {
            var container = document.getElementById('canvas-container');
            var c = document.getElementById('canvas');
            var dpr = window.devicePixelRatio || 1;
            var w = container.clientWidth;
            var h = container.clientHeight;
            c.style.width = w + 'px';
            c.style.height = h + 'px';
            c.width = Math.round(w * dpr);
            c.height = Math.round(h * dpr);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(function() {});
        }

        // Fullscreen + wake lock + orientation lock
        window.__requestFullscreen = function() {
            var el = document.documentElement;
            var rfs = el.requestFullscreen
                || el.webkitRequestFullscreen
                || el.mozRequestFullScreen
                || el.msRequestFullscreen;
            if (rfs) {
                rfs.call(el).then(function() {
                    // Try to lock orientation to current after entering fullscreen
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('any').catch(function() {});
                    }
                }).catch(function() {});
            }
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(function() {});
            }
        };

        // Trigger fullscreen on first user interaction (matches SDL PWA behavior).
        // Browsers require a user gesture to enter fullscreen.
        var fullscreenRequested = false;
        function onFirstInteraction() {
            if (fullscreenRequested) return;
            fullscreenRequested = true;
            // Only auto-fullscreen in standalone/PWA mode or mobile
            var isStandalone = window.matchMedia('(display-mode: standalone)').matches
                || window.matchMedia('(display-mode: fullscreen)').matches
                || window.navigator.standalone === true;
            var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            if (isStandalone || isMobile) {
                window.__requestFullscreen();
            }
            document.removeEventListener('click', onFirstInteraction);
            document.removeEventListener('touchstart', onFirstInteraction);
        }
        document.addEventListener('click', onFirstInteraction, { once: true });
        document.addEventListener('touchstart', onFirstInteraction, { once: true });

        // Re-request wake lock when page becomes visible again (e.g. switching back to tab)
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible' && 'wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(function() {});
            }
        });

        // Handle fullscreen exit — resize canvas
        document.addEventListener('fullscreenchange', function() { resizeCanvas(); setTimeout(resizeCanvas, 100); });
        document.addEventListener('webkitfullscreenchange', function() { resizeCanvas(); setTimeout(resizeCanvas, 100); });
    </script>
    <script type="module">
        import init, { get_ai_config, set_ai_config } from './battlefield_wgpu_native.js';
        await init();
        document.getElementById('loading').style.display = 'none';

        // Expose wasm functions for the config panel
        window.wasmModule = { get_ai_config: get_ai_config, set_ai_config: set_ai_config };
        wasmModule = window.wasmModule;

        // Cache defaults from the actual wasm module at startup
        try {
            var json = get_ai_config();
            var cfg = JSON.parse(json);
            for (var k in cfg) {
                aiConfigDefaults[k] = cfg[k];
                aiConfigCache[k] = cfg[k];
            }
        } catch (err) {
            console.warn('Initial get_ai_config failed, using schema defaults:', err);
        }
    </script>
</body>
