<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Battlefield</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: #e0e0e0;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        #canvas-wrapper {
            position: relative;
        }
        canvas {
            border: 2px solid #444;
            image-rendering: pixelated;
            display: block;
        }
        #hud {
            position: absolute;
            top: 8px;
            left: 8px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #turn-display {
            font-size: 0.8rem;
            color: #ffd700;
            text-shadow: 1px 1px 2px #000;
        }
        #phase-display {
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 1px 1px 3px #000;
        }
        #hp-container {
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #hp-label {
            font-size: 0.7rem;
            color: #ccc;
            text-shadow: 1px 1px 2px #000;
        }
        #hp-bar-bg {
            width: 120px;
            height: 10px;
            background: #333;
            border: 1px solid #555;
            border-radius: 2px;
            overflow: hidden;
        }
        #hp-bar-fill {
            height: 100%;
            width: 100%;
            background: #4caf50;
            transition: width 0.2s ease;
        }
        #loading {
            font-size: 1.2rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="canvas-wrapper">
            <canvas id="game-canvas" width="960" height="640"></canvas>
            <div id="hud">
                <div id="turn-display">Turn 1</div>
                <div id="phase-display" style="color: #4fc3f7;">Your Turn</div>
                <div id="hp-container">
                    <span id="hp-label">HP</span>
                    <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
                </div>
            </div>
        </div>
        <div id="loading">Loading...</div>
    </div>
    <script type="module">
        import init from './pkg/the_battlefield.js';

        async function run() {
            try {
                await init();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').textContent = 'Error: ' + e;
                console.error(e);
            }
        }
        run();
    </script>
</body>
</html>
