<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Real-time tactical battlefield game — command warriors, archers, lancers and monks in strategic combat.">
    <title>The Battlefield</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Battlefield">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: #1a1a2e;
            font-family: monospace;
            color: #e0e0e0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            /* Prevent pull-to-refresh and overscroll bounce */
            overscroll-behavior: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            /* Fill iOS safe areas with background color */
            padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            touch-action: none;
        }
        #hud {
            position: fixed;
            top: calc(8px + env(safe-area-inset-top, 0px));
            left: calc(8px + env(safe-area-inset-left, 0px));
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 10;
        }
        #hp-container {
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #hp-label {
            font-size: clamp(0.6rem, 1.8vw, 0.75rem);
            color: #ccc;
            text-shadow: 1px 1px 2px #000;
        }
        #hp-bar-bg {
            width: clamp(80px, 20vw, 160px);
            height: clamp(8px, 1.5vw, 12px);
            background: #333;
            border: 1px solid #555;
            border-radius: 2px;
            overflow: hidden;
        }
        #hp-bar-fill {
            height: 100%;
            width: 100%;
            background: #4caf50;
            transition: width 0.2s ease;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #aaa;
            z-index: 20;
        }
        #error-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            color: #ff6b6b;
            font-family: monospace;
            font-size: 0.9rem;
            padding: 20px;
            overflow: auto;
            z-index: 100;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas" width="960" height="640"></canvas>
    <div id="hud" style="display:none">
        <div id="hp-container">
            <span id="hp-label">HP</span>
            <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        </div>
    </div>
    <div id="loading">Loading...</div>
    <div id="error-overlay"></div>
    <script type="module">
        import init from './pkg/the_battlefield.js';

        // Register Service Worker (relative path for non-root deployments)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(() => {});
        }

        // Expose fullscreen request for Rust/WASM to call on Play button press
        window.__requestFullscreen = function() {
            const el = document.documentElement;
            const rfs = el.requestFullscreen
                || el.webkitRequestFullscreen
                || el.mozRequestFullScreen
                || el.msRequestFullscreen;
            if (rfs) {
                rfs.call(el).catch(() => {});
            }
            // Prevent screen from sleeping during gameplay
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(() => {});
            }
        };

        async function run() {
            try {
                await init();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                const overlay = document.getElementById('error-overlay');
                overlay.style.display = 'block';
                overlay.textContent = 'Error: ' + e + '\n\n' + (e.stack || '');
                console.error(e);
            }
        }
        run();
    </script>
</body>
</html>
